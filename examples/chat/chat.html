<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; background: #0a0a0f; color: #e0e0e0; display: flex; justify-content: center; padding: 2rem; height: 100vh; }
    .chat { width: 100%; max-width: 600px; display: flex; flex-direction: column; }
    h1 { font-size: 1.5rem; margin-bottom: 1rem; text-align: center; }
    #messages { flex: 1; overflow-y: auto; padding: 1rem; background: #12121a; border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; margin-bottom: 1rem; }
    .msg { margin-bottom: 0.8rem; display: flex; gap: 0.5rem; }
    .msg .user { color: #f857a6; font-weight: 600; font-size: 0.85rem; min-width: 60px; }
    .msg .text { color: #e0e0e0; font-size: 0.9rem; }
    .input { display: flex; gap: 0.5rem; }
    .input input { flex: 1; padding: 0.7rem 1rem; background: #12121a; border: 1px solid rgba(255,255,255,0.08); border-radius: 8px; color: #e0e0e0; font-size: 1rem; }
    .input button { padding: 0.7rem 1.5rem; background: linear-gradient(135deg, #f857a6, #ff5858); color: white; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; }
  </style>
</head>
<body>
  <div class="chat">
    <h1>PT Chat</h1>
    <div id="messages"></div>
    <div class="input">
      <input id="user" placeholder="Username" style="max-width: 120px;">
      <input id="text" placeholder="Type a message...">
      <button onclick="send()">Send</button>
    </div>
  </div>
  <script>
    function render(msgs) {
      document.getElementById('messages').innerHTML = msgs.map(m =>
        `<div class="msg"><span class="user">${m.user}</span><span class="text">${m.text}</span></div>`
      ).join('');
      document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
    }
    function send() {
      const user = document.getElementById('user').value || 'Anonymous';
      const text = document.getElementById('text').value;
      if (!text) return;
      fetch('/api/messages', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({user, text})})
        .then(() => { document.getElementById('text').value = ''; load(); });
    }
    function load() { fetch('/api/messages').then(r => r.json()).then(render); }
    load();
    setInterval(load, 2000);
  </script>
</body>
</html>
