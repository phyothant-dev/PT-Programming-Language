<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; background: #0a0a0f; color: #e0e0e0; line-height: 1.6; }
    nav { padding: 1.5rem 2rem; border-bottom: 1px solid rgba(255,255,255,0.08); }
    nav a { color: #f857a6; text-decoration: none; font-weight: 600; font-size: 1.2rem; }
    main { max-width: 700px; margin: 3rem auto; padding: 0 2rem; }
    h1 { font-size: 2rem; margin-bottom: 2rem; }
    .post { padding: 1.5rem 0; border-bottom: 1px solid rgba(255,255,255,0.08); }
    .post h2 { font-size: 1.3rem; margin-bottom: 0.3rem; }
    .post h2 a { color: #ffc371; text-decoration: none; }
    .post h2 a:hover { text-decoration: underline; }
    .post time { color: #888; font-size: 0.85rem; }
  </style>
</head>
<body>
  <nav><a href="/">My Blog</a></nav>
