<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; background: #0a0a0f; color: #e0e0e0; text-align: center; }
    .hero { padding: 6rem 2rem 3rem; }
    .hero h1 { font-size: 2.5rem; font-weight: 800; margin-bottom: 0.5rem; }
    .hero p { color: #f857a6; font-size: 1.1rem; }
    .projects { max-width: 800px; margin: 0 auto; padding: 0 2rem 4rem; display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1.5rem; }
    .project { background: #12121a; border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; padding: 1.5rem; text-align: left; }
    .project h3 { color: #ffc371; margin-bottom: 0.5rem; }
    .project p { color: #888; font-size: 0.9rem; margin-bottom: 1rem; }
    .project a { color: #f857a6; text-decoration: none; font-size: 0.85rem; }
    .project a:hover { text-decoration: underline; }
    footer { text-align: center; padding: 3rem; color: #888; border-top: 1px solid rgba(255,255,255,0.08); }
  </style>
</head>
<body>
  <div class="hero">
    <h1>{{NAME}}</h1>
    <p>{{BIO}}</p>
  </div>
  <div class="projects">{{PROJECTS}}</div>
  <footer>Built with PT Programming Language</footer>
</body>
</html>
